<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景 -->
  <rect width="512" height="512" rx="100" fill="#1a1025"/>
  
  <!-- 星 -->
  <circle cx="80" cy="80" r="4" fill="#e8b4f8" opacity="0.8"/>
  <circle cx="420" cy="60" r="3" fill="#e8b4f8" opacity="0.6"/>
  <circle cx="450" cy="150" r="5" fill="#f5d76e" opacity="0.7"/>
  <circle cx="60" cy="200" r="3" fill="#e8b4f8" opacity="0.5"/>
  <circle cx="400" cy="400" r="4" fill="#e8b4f8" opacity="0.6"/>
  <circle cx="100" cy="420" r="3" fill="#f5d76e" opacity="0.5"/>
  
  <!-- 月 -->
  <circle cx="380" cy="100" r="45" fill="#f5d76e" opacity="0.9"/>
  <circle cx="400" cy="85" r="38" fill="#1a1025"/>

  <!-- 猫の体 -->
  <ellipse cx="256" cy="340" rx="110" ry="100" fill="#1a1025"/>
  <ellipse cx="256" cy="340" rx="108" ry="98" fill="#2a2a2a"/>
  
  <!-- 猫の頭 -->
  <circle cx="256" cy="220" r="95" fill="#2a2a2a"/>
  
  <!-- 耳（左） -->
  <polygon points="175,155 155,90 215,140" fill="#2a2a2a"/>
  <polygon points="178,150 163,105 208,140" fill="#5a3d7a"/>
  
  <!-- 耳（右） -->
  <polygon points="337,155 357,90 297,140" fill="#2a2a2a"/>
  <polygon points="334,150 349,105 304,140" fill="#5a3d7a"/>
  
  <!-- 目（左） -->
  <ellipse cx="220" cy="215" rx="22" ry="25" fill="#e8b4f8"/>
  <ellipse cx="220" cy="215" rx="12" ry="22" fill="#1a1025"/>
  <circle cx="214" cy="208" r="5" fill="white"/>
  
  <!-- 目（右） -->
  <ellipse cx="292" cy="215" rx="22" ry="25" fill="#e8b4f8"/>
  <ellipse cx="292" cy="215" rx="12" ry="22" fill="#1a1025"/>
  <circle cx="286" cy="208" r="5" fill="white"/>
  
  <!-- 鼻 -->
  <polygon points="256,248 248,258 264,258" fill="#e8b4f8"/>
  
  <!-- 口 -->
  <path d="M248,258 Q240,270 232,265" stroke="#e8b4f8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M264,258 Q272,270 280,265" stroke="#e8b4f8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- ひげ（左） -->
  <line x1="180" y1="252" x2="240" y2="258" stroke="#b09ec0" stroke-width="2" opacity="0.7"/>
  <line x1="175" y1="265" x2="238" y2="265" stroke="#b09ec0" stroke-width="2" opacity="0.7"/>
  <line x1="180" y1="278" x2="240" y2="272" stroke="#b09ec0" stroke-width="2" opacity="0.7"/>
  
  <!-- ひげ（右） -->
  <line x1="332" y1="252" x2="272" y2="258" stroke="#b09ec0" stroke-width="2" opacity="0.7"/>
  <line x1="337" y1="265" x2="274" y2="265" stroke="#b09ec0" stroke-width="2" opacity="0.7"/>
  <line x1="332" y1="278" x2="272" y2="272" stroke="#b09ec0" stroke-width="2" opacity="0.7"/>
  
  <!-- 首輪 -->
  <rect x="170" y="295" width="172" height="22" rx="11" fill="#5a3d7a"/>
  <circle cx="256" cy="306" r="10" fill="#f5d76e"/>
  <text x="256" y="311" text-anchor="middle" font-size="12" fill="#1a1025">★</text>
  
  <!-- しっぽ -->
  <path d="M340,400 Q420,380 440,320 Q460,260 420,250" stroke="#2a2a2a" stroke-width="28" fill="none" stroke-linecap="round"/>
  <path d="M340,400 Q420,380 440,320 Q460,260 420,250" stroke="#3a3a3a" stroke-width="22" fill="none" stroke-linecap="round"/>
  
  <!-- 前足（左） -->
  <ellipse cx="200" cy="430" rx="35" ry="25" fill="#2a2a2a"/>
  <!-- 前足（右） -->
  <ellipse cx="312" cy="430" rx="35" ry="25" fill="#2a2a2a"/>
  
  <!-- 肉球 -->
  <circle cx="200" cy="435" r="8" fill="#5a3d7a" opacity="0.6"/>
  <circle cx="312" cy="435" r="8" fill="#5a3d7a" opacity="0.6"/>
</svg>
